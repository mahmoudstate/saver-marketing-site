    <!-- Interactive Scripts -->
    <script>
        // Language Toggle
        let isArabic = false;
        function toggleLanguage() {
            isArabic = !isArabic;
            document.documentElement.lang = isArabic ? 'ar' : 'en';
        }

        // Theme Toggle
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            document.documentElement.classList.toggle('light');
        }

        // GSAP Animations (Respecting prefers-reduced-motion)
        const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        
        if (!prefersReducedMotion && typeof gsap !== 'undefined') {
            gsap.registerPlugin(ScrollTrigger);

            gsap.from('.hero-el', {
                y: 20, opacity: 0, duration: 0.6, stagger: 0.1, ease: 'power3.out', delay: 0.1
            });

            gsap.from('.hero-mockup', {
                y: 40, opacity: 0, duration: 0.8, ease: 'power3.out', delay: 0.3
            });
            
            // Subtle floating for mockup
            gsap.to('.hero-mockup', {
                y: 12, duration: 3, repeat: -1, yoyo: true, ease: 'sine.inOut'
            });

            // Scroll reveals
            gsap.utils.toArray('.scroll-reveal').forEach(el => {
                gsap.from(el, {
                    scrollTrigger: { trigger: el, start: 'top 85%' },
                    y: 25, opacity: 0, duration: 0.6, ease: 'power3.out'
                });
            });

            // Live Balance Count-Up
            let balanceObj = { val: 0 };
            gsap.to(balanceObj, {
                val: 1450.00, duration: 1.5, ease: 'power3.out', delay: 0.8,
                onUpdate: () => document.getElementById('live-balance').innerText = `£${balanceObj.val.toFixed(2).replace(/\d(?=(\d{3})+\.)/g, '$&,')}`
            });
        } else if (prefersReducedMotion) {
            document.getElementById('live-balance').innerText = `£1,450.00`;
        }
    </script>
