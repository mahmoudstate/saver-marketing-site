<!DOCTYPE html>
<html lang="en" class="dark" style="scroll-behavior: smooth;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saver | See what's safe to spend</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="See what’s safe to spend — and save calmly. 100% offline, no sign-up personal budgeting app.">
    
    <!-- Fonts: Inter & Cairo -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS with Saver DNA -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            // Dark Theme Tokens from saver-ui.css
                            darkBg: '#0C0D11',
                            darkSurface: '#15161D',
                            darkCard: '#1E1E28',
                            darkText: '#E9E9F1',
                            darkSec: '#8A8AA4',
                            darkBorder: '#26262F',
                            darkTrack: '#24242E',
                            // Light Theme Tokens from saver-ui.css
                            lightBg: '#F4F4F8',
                            lightSurface: '#FFFFFF',
                            lightText: '#2B2E35',
                            lightSec: '#646773',
                            lightBorder: '#E6E7EE',
                            lightTrack: '#EBECF1',
                            // Accent
                            mint: '#5FE3C0',
                            mintLight: '#8af0d6',
                            onMint: '#06251F',
                            // Semantic Dark
                            redDark: '#F2766E', blueDark: '#60A5FA', yellowDark: '#FBBF24', 
                            purpleDark: '#A78BFA', orangeDark: '#FB923C', greenDark: '#34D399',
                            // Semantic Light
                            redLight: '#E5544E', blueLight: '#2563EB', yellowLight: '#D97706', 
                            purpleLight: '#7C3AED', orangeLight: '#EA580C', greenLight: '#0E9F6E',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        arabic: ['Cairo', 'sans-serif']
                    },
                    boxShadow: {
                        'cardLight': '0 1px 2px rgba(20,22,40,.04),0 6px 18px rgba(20,22,40,.05)',
                        'navDark': '0 16px 40px rgba(0,0,0,.55)',
                        'glow': '0 0 20px rgba(95, 227, 192, 0.15)',
                    },
                    borderRadius: {
                        'saver-md': '16px',
                        'saver-lg': '18px',
                        'saver-xl': '22px',
                        'saver-2xl': '26px',
                    }
                }
            }
        }
    </script>

    <!-- GSAP for Motion -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
        /* Base & Accessibility */
        body { background-color: theme('colors.brand.darkBg'); color: theme('colors.brand.darkText'); transition: background-color 0.4s, color 0.4s; }
        .light body { background-color: theme('colors.brand.lightBg'); color: theme('colors.brand.lightText'); }
        
        /* Language Specific Styles */
        :lang(ar) { font-family: 'Cairo', sans-serif; direction: rtl; line-height: 1.8; letter-spacing: 0; }
        :lang(ar) .force-inter { font-family: 'Inter', sans-serif; direction: ltr; display: inline-block; unicode-bidi: isolate; }
        
        /* Saver Custom Gradients & Tints */
        .hero-gradient { background: linear-gradient(155deg, color-mix(in srgb, #5FE3C0 40%, #fff) 0%, color-mix(in srgb, #5FE3C0 66%, #fff) 100%); }
        .hero-text { color: #1B332C; }
        .hero-sub { color: rgba(27,51,44,.80); }
        .hero-chip { background: rgba(255,255,255,.22); color: #1B332C; }

        .icon-tint { background: color-mix(in srgb, currentColor 14%, transparent); }

        /* Phone Mockup Styling matching App Shell */
        .phone-mockup {
            aspect-ratio: 9/19.5;
            border-radius: 44px;
            border: 8px solid #08090C;
            background-color: #0C0D11;
            overflow: hidden;
            position: relative;
            box-shadow: 0 44px 80px rgba(8,9,14,.42),0 14px 36px rgba(8,9,14,.28);
        }
        .light .phone-mockup { border-color: #E7EAF0; background-color: #F4F4F8; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); }
        .phone-notch { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 40%; height: 24px; background: #08090C; border-bottom-left-radius: 12px; border-bottom-right-radius: 12px; z-index: 10;}
        .light .phone-notch { background: #E7EAF0; }

        /* Button Gradients */
        .btn-primary { background: linear-gradient(135deg, theme('colors.brand.mint'), theme('colors.brand.mintLight')); color: theme('colors.brand.onMint'); box-shadow: 0 1px 2px rgba(0,0,0,.10),inset 0 1px 0 rgba(255,255,255,.28); }

        /* Respect Reduced Motion */
        @media (prefers-reduced-motion: reduce) {
            *, ::before, ::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; scroll-behavior: auto !important; }
        }
    </style>
</head>
